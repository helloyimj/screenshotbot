<!DOCTYPE html>
<html>
<head>
    <title>URL 스크린샷 도구</title>
</head>
<body>
    <h1>엑셀 파일(.xlsx)을 업로드하세요</h1>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".xlsx">
        <button type="submit">스크린샷 시작 및 ZIP 생성</button>
    </form>
    <p>주의: URL이 많으면 시간이 오래 걸릴 수 있습니다.</p>
</body>
</html>
